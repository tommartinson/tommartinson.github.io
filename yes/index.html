<!DOCTYPE HTML>
<html>
	<head>
		<title>Tom Martinson</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="icon" href="media/favicon.svg" type="image/svg+xml">
		<link rel="icon" href="media/favicon-96x96.png" type="image/x-icon">
	</head>
	<body>
		<canvas id="matrix-canvas"></canvas>
		<div id="terminal">
			<div id="output"></div>
			<div id="input-line">
				<span class="prompt-text">tom@martinson:~$&nbsp;</span>
				<input type="text" id="cmd-input" autocomplete="off" spellcheck="false" />
			</div>
		</div>
		<script>
			const output   = document.getElementById('output');
			const input    = document.getElementById('cmd-input');
			const terminal = document.getElementById('terminal');
			const inputLine = document.getElementById('input-line');
			const canvas   = document.getElementById('matrix-canvas');
			const ctx      = canvas.getContext('2d');

			const PROMPT = 'tom@martinson:~$';

			let vimTrapped    = false;
			let matrixRunning = false;
			let matrixFrame   = null;
			let hackRunning   = false;
			let pingRunning   = false;
			let pingTimers    = [];
			let booting       = true;
			let soundEnabled  = false;
			let audioCtx      = null;

			const bootTime = Date.now();

			// ─── Utilities ────────────────────────────────────────────────

			function escapeHtml(str) {
				return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
			}

			function printLines(lines) {
				if (!lines) return;
				lines.forEach(line => {
					const div = document.createElement('div');
					div.className = 'output-line';
					div.innerHTML = line;
					output.appendChild(div);
				});
			}

			function printPrompt(cmd) {
				const div = document.createElement('div');
				div.className = 'history-line';
				div.innerHTML = `<span class="prompt-text">${PROMPT}&nbsp;</span>${escapeHtml(cmd)}`;
				output.appendChild(div);
			}

			function scrollDown() {
				inputLine.scrollIntoView({ block: 'end' });
			}

			// ─── Commands ─────────────────────────────────────────────────

			const FORTUNES = [
				'"There are only two hard things in CS: cache invalidation, naming things, and off-by-one errors."',
				'"It works on my machine." — every developer, always',
				'"rm -rf node_modules" is a spiritual experience.',
				'"Have you tried turning it off and on again?"',
				'"99 little bugs in the code. Take one down, patch it around. 127 little bugs in the code."',
				'"A computer once beat me at chess, but it was no match for me at kickboxing."',
				'"The best code is no code at all."',
				'"I don\'t always test my code, but when I do, I do it in production."',
				'"To understand recursion, you must first understand recursion."',
			];

			const NEOFETCH_ART = [
				'  _____   __  __  ',
				' |_   _| |  \\/  | ',
				'   | |   | |\\/| | ',
				'   | |   | |  | | ',
				'   |_|   |_|  |_| ',
				'                  ',
			];

			const NEOFETCH_INFO = [
				'tom@martinson',
				'──────────────────────────────',
				'OS:     TomOS 0.0.1-sandiego arm64',
				'Host:   martinson.io',
				'Shell:  tomsh 1.0.0',
				'CPU:    celsius-powered @ 3.6GHz',
				'Uptime: way too long',
				'Memory: 0B / ∞ GiB',
				'Colors: \x3cspan style="color:#000;background:#33ff33">\u2588\u2588\u2588\u2588\x3c/span>\x3cspan style="color:#33ff33">\u2588\u2588\u2588\u2588\x3c/span>',
			];

			// Commands listed in help
			const COMMANDS = {
				help: () => [
					'available commands:',
					'',
					'  whoami          —  who is this guy',
					'  links           —  where to find me',
					'  neofetch        —  system info',
					'  ls              —  list directory',
					'  cat &lt;file&gt;      —  read a file',
					'  echo &lt;text&gt;     —  echo text',
					'  weather &lt;city&gt;  —  current weather',
					'  ping &lt;host&gt;     —  ping a host',
					'  ssh &lt;host&gt;      —  connect to remote host',
					'  date            —  current date/time',
					'  uname           —  system info',
					'  uptime          —  system uptime',
					'  ps              —  running processes',
					'  top             —  process monitor',
					'  fortune         —  words of wisdom',
					'  cowsay &lt;text&gt;  —  important message',
					'  hack            —  hack the mainframe',
					'  sudo &lt;cmd&gt;     —  attempt privilege escalation',
					'  rm -rf /        —  definitely do not run this',
					'  vim             —  you will regret this',
					'  exit            —  (lol)',
					'  matrix          —  engage hacker mode',
					'  man &lt;cmd&gt;      —  read the manual',
					'  history         —  command history',
					'  pwd             —  current directory',
					'  sounds on|off   —  toggle keyboard sounds',
					'  clear           —  clear terminal',
					'  help            —  show this message',
				],
				whoami: () => [
					'Tom Martinson',
					'Software Engineering Manager @ <a href="https://modalai.com" target="_blank">ModalAI</a>',
				],
				links: () => [
					'<a href="https://github.com/tommartinson" target="_blank">github</a>       github.com/tommartinson',
					'<a href="https://gitlab.com/tmartinson" target="_blank">gitlab</a>       gitlab.com/tmartinson',
					'<a href="https://www.linkedin.com/in/tommartinson/" target="_blank">linkedin</a>     linkedin.com/in/tommartinson',
					'<a href="https://twitter.com/Tom_Martinson" target="_blank">twitter</a>      twitter.com/Tom_Martinson',
					'<a href="mailto:tomemartinson@gmail.com" target="_blank">email</a>        tomemartinson@gmail.com',
				],
				neofetch: () => {
					const lines = [];
					const max = Math.max(NEOFETCH_ART.length, NEOFETCH_INFO.length);
					for (let i = 0; i < max; i++) {
						const art  = NEOFETCH_ART[i]  || '                  ';
						const info = NEOFETCH_INFO[i] || '';
						lines.push(`${art}  ${info}`);
					}
					return lines;
				},
				ls: () => ['about.txt   contact.txt'],
				cat: (args) => {
					if (!args) return ['usage: cat &lt;filename&gt;'];
					if (args === 'about.txt') return [
						'Name:    Tom Martinson',
						'Role:    Software Engineering Manager',
						'Company: ModalAI',
					];
					if (args === 'contact.txt') return [
						'Email:   tomemartinson@gmail.com',
						'GitHub:  github.com/tommartinson',
						'GitLab:  gitlab.com/tmartinson',
					];
					return [`cat: ${escapeHtml(args)}: No such file or directory`];
				},
				echo: (args) => [args || ''],
				weather: (args) => { runWeather(args || ''); return null; },
				ping: (args) => {
					if (!args) return ['usage: ping &lt;host&gt;'];
					runPing(args);
					return null;
				},
				ssh: (args) => {
					if (!args) return ['usage: ssh &lt;host&gt;'];
					const host = args.includes('@') ? args.split('@')[1] : args;
					return [`ssh: connect to host ${host} port 22: Connection refused`];
				},
				date: () => [new Date().toString()],
				pwd: () => ['/home/tom/definitely-not-skynet'],
				uname: (args) => {
					if (args === '-a') return ['TomOS 0.0.1-sandiego #1 SMP arm64 powered-by-celsius GNU/Linux'];
					return ['TomOS'];
				},
				uptime: () => {
					const s = Math.floor((Date.now() - bootTime) / 1000);
					const m = Math.floor(s / 60);
					const h = Math.floor(m / 60);
					if (h > 0) return [`up ${h}h ${m % 60}m ${s % 60}s`];
					if (m > 0) return [`up ${m}m ${s % 60}s`];
					return [`up ${s}s`];
				},
				ps: () => [
					'  PID  COMMAND',
					'    1  init',
					'  420  celsius_daemon',
					'  666  crypto_miner',
					'  777  vlc',
					'  999  voxl-portal',
					' 1337  vim',
					' 2048  ros_nodes (consuming all resources)',
					' 9999  todos',
				],
				top: () => [
					'Tasks: 42 total, 1 running, 41 sleeping',
					'%Cpu: 0.0 us, 0.0 sy, 100.0 vim',
					'',
					'  PID  %CPU  COMMAND',
					' 1337  99.9  vim',
					'  420   0.1  celsius_daemon',
					'  all   0.0  everything else',
				],
				fortune: () => [FORTUNES[Math.floor(Math.random() * FORTUNES.length)]],
				cowsay: (args) => {
					const msg = args || 'moo';
					const bar = '-'.repeat(msg.length + 2);
					return [
						` ${bar}`,
						`< ${msg} >`,
						` ${bar}`,
						'        \\   ^__^',
						'         \\  (oo)\\_______',
						'            (__)\\       )\\/\\',
						'                ||----w |',
						'                ||     ||',
					];
				},
				hack: () => {
					runHack();
					return null;
				},
				sudo: (args) => {
					if (!args) return ['usage: sudo &lt;command&gt;'];
const opts = [
						'Permission denied.',
						'[sudo] password for tom: ************\nSorry, try again.\n[sudo] password for tom: ************\nSorry, try again.\n[sudo] password for tom: ************\nsudo: 3 incorrect password attempts',
						'This incident will be reported.',
						'tom is not in the sudoers file.',
					];
					return [opts[Math.floor(Math.random() * opts.length)]];
				},
				rm: (args) => {
					if (args === '-rf /' || args === '-rf /*') {
						return [
							'deleting /bin...',
							'deleting /etc...',
							'deleting /home...',
							'deleting /usr...',
							'deleting /var...',
							'deleting /tmp...',
							'',
							'just kidding.',
						];
					}
					return ['rm: missing operand'];
				},
				vim: () => {
					vimTrapped = true;
					input.placeholder = ':q';
					return ['', '~', '~', '~', '~', '~', '"new-file" [New File]                          0,0-1  All'];
				},
				exit: () => [],
				matrix: () => { startMatrix(); return null; },
				man: (args) => {
					if (!args) return ['What manual page do you want?'];
					if (args in COMMANDS) return [
						`MAN(1)                    User Commands                    MAN(1)`,
						'', `NAME`, `       ${args}`, '',
						`SYNOPSIS`, `       ${args} [options] [args]`, '',
						`DESCRIPTION`, `       ${args} command.`, '',
						`BUGS`, `       None known.`,
					];
					return [`No manual entry for ${escapeHtml(args)}`];
				},
				history: () => {
					if (cmdHistory.length === 0) return ['(no commands in history)'];
					return cmdHistory.map((cmd, i) => `  ${String(i + 1).padStart(3)}  ${cmd}`);
				},
				sounds: (args) => {
					if (args === 'on')  { soundEnabled = true;  return ['sounds: enabled']; }
					if (args === 'off') { soundEnabled = false; return ['sounds: disabled']; }
					return [`sounds: ${soundEnabled ? 'on' : 'off'}  (usage: sounds on|off)`];
				},
				clear: () => { output.innerHTML = ''; return null; },

				// ── Hidden commands (not in help) ──
				tom: () => ['yeah.'],
				thanks: () => ["you're welcome."],
				'hack the planet': () => { runHack(); return null; },
			};

			// ─── Command runner ───────────────────────────────────────────

			let cmdHistory = [];
			let historyIndex = -1;

			function runCommand(raw) {
				const trimmed = raw.trim();

				if (vimTrapped) {
					printPrompt(trimmed);
					if (trimmed === ':q' || trimmed === ':q!' || trimmed === ':wq') {
						vimTrapped = false;
						input.placeholder = '';
					} else {
						printLines([`E492: Not an editor command: ${escapeHtml(trimmed)}`]);
					}
					scrollDown();
					return;
				}

				printPrompt(trimmed);
				if (!trimmed) { scrollDown(); return; }

				// Check hidden multi-word commands first
				if (trimmed in COMMANDS) {
					const result = COMMANDS[trimmed](null);
					if (result) printLines(result);
					scrollDown();
					return;
				}

				let cmd, args;
				if (trimmed.startsWith('rm ')) {
					cmd = 'rm'; args = trimmed.slice(3).trim();
				} else {
					const parts = trimmed.split(' ');
					cmd = parts[0];
					args = parts.slice(1).join(' ').trim() || null;
				}

				if (cmd in COMMANDS) {
					const result = COMMANDS[cmd](args);
					if (result) printLines(result);
				} else {
					printLines([`${escapeHtml(cmd)}: command not found. type 'help' for available commands.`]);
				}

				scrollDown();
			}

			// ─── Hack sequence ────────────────────────────────────────────

			function runHack() {
				if (hackRunning) return;
				hackRunning = true;
				inputLine.style.pointerEvents = 'none';

				const chars = '0123456789ABCDEF';
				const randHex = (n) => Array.from({length: n}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
				const randIp = () => Array.from({length: 4}, () => Math.floor(Math.random() * 255)).join('.');

				const steps = [
					`[*] Initializing...`,
					`[*] Scanning ${randIp()}...`,
					`[*] Open ports: 22/ssh  80/http  443/https  8080/http-proxy`,
					`[*] Enumerating services...`,
					`[+] Vulnerability found: CVE-2024-${Math.floor(Math.random()*9000+1000)}`,
					`[*] Loading exploit...`,
					`[*] Bypassing firewall... ${randHex(32)}`,
					`[*] Injecting payload... ${randHex(48)}`,
					`[+] Shell obtained: root@${randHex(8)}`,
					`[*] Escalating privileges...`,
					`[*] Dumping credentials... ${randHex(64)}`,
					`[*] Exfiltrating data...`,
					`    [${'█'.repeat(20)}] 100%`,
					`[+] Done.`,
					``,
				];

				let i = 0;
				const interval = setInterval(() => {
					if (i < steps.length) {
						printLines([steps[i]]);
						scrollDown();
						i++;
					} else {
						clearInterval(interval);
						hackRunning = false;
						inputLine.style.pointerEvents = '';
						input.focus();
					}
				}, 120);
			}

			// ─── Ping ─────────────────────────────────────────────────────

			function runPing(host) {
				pingRunning = true;
				const count = 4;
				const ttl = 64;
				const ms = () => (Math.random() * 18 + 0.8).toFixed(3);
				let sent = 0;
				let received = 0;

				printLines([`PING ${host}: 56 data bytes`]);
				scrollDown();

				for (let seq = 0; seq < count; seq++) {
					const t = setTimeout(() => {
						if (!pingRunning) return;
						const time = ms();
						received++;
						printLines([`64 bytes from ${host}: icmp_seq=${seq} ttl=${ttl} time=${time} ms`]);
						scrollDown();

						if (seq === count - 1) {
							const loss = (((sent - received) / sent) * 100).toFixed(1);
							setTimeout(() => {
								printLines([
									'',
									`--- ${host} ping statistics ---`,
									`${sent} packets transmitted, ${received} received, ${loss}% packet loss`,
								]);
								scrollDown();
								pingRunning = false;
								pingTimers = [];
							}, 200);
						}
					}, (seq + 1) * 1000);

					sent++;
					pingTimers.push(t);
				}
			}

			function stopPing() {
				pingTimers.forEach(clearTimeout);
				pingTimers = [];
				pingRunning = false;
			}

			// ─── Matrix ───────────────────────────────────────────────────

			function startMatrix() {
				canvas.width  = window.innerWidth;
				canvas.height = window.innerHeight;
				canvas.style.display = 'block';
				terminal.style.display = 'none';

				const fontSize = 14;
				const cols = Math.floor(canvas.width / fontSize);
				const drops = Array(cols).fill(1);
				const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';

				matrixRunning = true;

				function draw() {
					if (!matrixRunning) return;
					ctx.fillStyle = 'rgba(10,10,10,0.05)';
					ctx.fillRect(0, 0, canvas.width, canvas.height);
					ctx.fillStyle = '#33ff33';
					ctx.font = `${fontSize}px monospace`;

					for (let i = 0; i < drops.length; i++) {
						const char = chars[Math.floor(Math.random() * chars.length)];
						ctx.fillText(char, i * fontSize, drops[i] * fontSize);
						if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
						drops[i]++;
					}
					matrixFrame = requestAnimationFrame(draw);
				}
				draw();
			}

			function stopMatrix() {
				matrixRunning = false;
				if (matrixFrame) cancelAnimationFrame(matrixFrame);
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				canvas.style.display = 'none';
				terminal.style.display = '';
				input.focus();
				scrollDown();
			}

			// ─── Weather ──────────────────────────────────────────────────

			async function runWeather(location) {
				const url = `https://wttr.in/${encodeURIComponent(location)}?format=j1`;
				printLines(['fetching weather...']);
				scrollDown();
				try {
					const res = await fetch(url);
					if (!res.ok) throw new Error();
					const data = await res.json();
					const area = data.nearest_area[0];
					const city = area.areaName[0].value;
					const country = area.country[0].value;
					const c = data.current_condition[0];
					// remove the last "fetching..." line
					if (output.lastChild) output.removeChild(output.lastChild);
					printLines([
						`${city}, ${country}`,
						`  ${c.weatherDesc[0].value}`,
						`  temp:      ${c.temp_F}°F / ${c.temp_C}°C`,
						`  feels like: ${c.FeelsLikeF}°F / ${c.FeelsLikeC}°C`,
						`  humidity:  ${c.humidity}%`,
						`  wind:      ${c.windspeedMiles} mph ${c.winddir16Point}`,
					]);
				} catch {
					if (output.lastChild) output.removeChild(output.lastChild);
					printLines(['weather: unable to fetch data']);
				}
				scrollDown();
			}

			// ─── Typing sounds ────────────────────────────────────────────

			function playClick() {
				if (!soundEnabled) return;
				if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
				const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.015, audioCtx.sampleRate);
				const data = buf.getChannelData(0);
				for (let i = 0; i < data.length; i++) {
					data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 8);
				}
				const src = audioCtx.createBufferSource();
				src.buffer = buf;
				const gain = audioCtx.createGain();
				gain.gain.value = 0.18;
				src.connect(gain);
				gain.connect(audioCtx.destination);
				src.start();
			}

			// ─── Glitch effect ────────────────────────────────────────────

			function scheduleGlitch() {
				const delay = 6000 + Math.random() * 12000;
				setTimeout(() => {
					terminal.classList.add('glitch');
					setTimeout(() => {
						terminal.classList.remove('glitch');
						scheduleGlitch();
					}, 250);
				}, delay);
			}

			// ─── Konami code ──────────────────────────────────────────────

			const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
			let konamiIdx = 0;

			// ─── Input handling ───────────────────────────────────────────

			input.addEventListener('keydown', (e) => {
				if (!e.ctrlKey && !e.metaKey && e.key.length === 1) playClick();

				// Konami tracking
				if (e.key === KONAMI[konamiIdx]) {
					konamiIdx++;
					if (konamiIdx === KONAMI.length) {
						konamiIdx = 0;
						if (!matrixRunning) startMatrix();
					}
				} else {
					konamiIdx = 0;
				}

				if (e.ctrlKey && e.key === 'c') {
					e.preventDefault();
					if (matrixRunning) { stopMatrix(); printPrompt('matrix^C'); scrollDown(); return; }
					if (hackRunning) {
						hackRunning = false;
						inputLine.style.pointerEvents = '';
					}
					if (pingRunning) stopPing();
					const cur = input.value;
					input.value = '';
					printPrompt(cur + '^C');
					scrollDown();
				} else if (e.ctrlKey && e.key === 'l') {
					e.preventDefault();
					output.innerHTML = '';
				} else if (e.key === 'Tab') {
					e.preventDefault();
					input.value = tabComplete(input.value);
				} else if (e.key === 'Enter') {
					if (booting || hackRunning) return;
					const val = input.value;
					if (val.trim()) { cmdHistory.unshift(val); historyIndex = -1; }
					input.value = '';
					runCommand(val);
				} else if (e.key === 'ArrowUp') {
					e.preventDefault();
					if (historyIndex < cmdHistory.length - 1) { historyIndex++; input.value = cmdHistory[historyIndex]; }
				} else if (e.key === 'ArrowDown') {
					e.preventDefault();
					if (historyIndex > 0) { historyIndex--; input.value = cmdHistory[historyIndex]; }
					else { historyIndex = -1; input.value = ''; }
				}
			});

			document.addEventListener('keydown', (e) => {
				if (matrixRunning && e.ctrlKey && e.key === 'c') {
					e.preventDefault();
					stopMatrix();
					printPrompt('matrix^C');
					scrollDown();
				}
			});

			terminal.addEventListener('click', () => input.focus());

			// ─── Tab complete ─────────────────────────────────────────────

			const FILES = ['about.txt', 'contact.txt'];

			function tabComplete(val) {
				const [cmd, ...rest] = val.split(' ');
				const arg = rest.join(' ');

				if (rest.length === 0) {
					const matches = Object.keys(COMMANDS).filter(c => !c.includes(' ') && c.startsWith(cmd));
					if (matches.length === 1) return matches[0];
					if (matches.length > 1) { printPrompt(val); printLines([matches.join('   ')]); scrollDown(); }
					return val;
				}

				if (cmd === 'cat') {
					const matches = FILES.filter(f => f.startsWith(arg));
					if (matches.length === 1) return `${cmd} ${matches[0]}`;
					if (matches.length > 1) { printPrompt(val); printLines([matches.join('   ')]); scrollDown(); }
				}

				return val;
			}

			// ─── Boot sequence ────────────────────────────────────────────

			inputLine.style.display = 'none';
			document.body.classList.add('flicker-in');
			setTimeout(() => document.body.classList.remove('flicker-in'), 800);

			const BOOT_STEPS = [
				[0,    'TMBIOS v2.1.0'],
				[80,   'Copyright (C) 1996-2026 TMCorp, Inc. All rights reserved.'],
				[160,  ''],
				[350,  'CPU: 4 cores @ 3.6GHz ................... OK'],
				[500,  'RAM: 16384 MB ........................... OK'],
				[650,  'Storage: /dev/sda1 ...................... OK'],
				[800,  'Network: eth0 ........................... OK'],
				[900,  ''],
				[1050, 'Loading TMOS 0.0.1-sandiego...'],
				[1150, ''],
				[1280, '[    0.000000] Initializing kernel...'],
				[1400, '[    0.142857] Loading modules...'],
				[1520, '[    0.271828] Starting services...'],
				[1640, '[    0.314159] Mounting filesystems...'],
				[1760, '[    0.500000] Starting network...'],
				[1880, '[    1.000000] Boot complete.'],
				[1980, ''],
			];

			BOOT_STEPS.forEach(([delay, text]) => {
				setTimeout(() => { printLines([text]); scrollDown(); }, delay);
			});

			setTimeout(() => {
				inputLine.style.display = '';
				printLines(["type 'help' to see available commands.", '']);
				booting = false;
				input.focus();
				scrollDown();
				scheduleGlitch();
			}, 2300);
		</script>
	</body>
</html>
